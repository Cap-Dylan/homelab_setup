global:
  scrape_interval: 15s
scrape_configs:
  - job_name: 'vivobook'
    static_configs:
      - targets: ['<VIVOBOOK_LAN_IP>:9100']
  - job_name: 'msi'
    static_configs:
      - targets: ['<MSI_LAN_IP>:9100']
  - job_name: 'nas'
    static_configs:
      - targets: ['<NAS_LAN_IP>:9100']
  - job_name: 'home_assistant'
    static_configs:
      - targets: ['<HA_LAN_IP>:9100']
